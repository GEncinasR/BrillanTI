<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Consulta - SAUAP</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/style.css" />
    <style>
        .horario-box {
            margin-top: 30px;
            padding: 20px;
            background: #f1f3f5;
            border-radius: 8px;
            font-size: 1.2em;
            white-space: pre-wrap;
            border-left: 5px solid #002677;
        }
    </style>
</h:head>

<h:body>
    <f:metadata>
        <f:event type="preRenderView" listener="#{asignadoUI.refreshData()}" />
    </f:metadata>
    <div class="header-container">
        <h:form>
            <h:commandLink action="#{asignadoUI.regresar()}" styleClass="back-arrow">
                <span class="glyphicon glyphicon-arrow-left"></span>
            </h:commandLink>
        </h:form>
        <div class="header-title">Consulta de Horario por Profesor</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="main-card">
        <h:form id="formConsulta">
            <p:growl id="growl" showDetail="true" life="3000"/>

            <div class="form-group">
                <label>Seleccione un Profesor</label>
                <p:selectOneMenu id="profesor" value="#{asignadoUI.idProfesor}" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="Seleccione..." itemValue="" noSelectionOption="true"/>
                    <f:selectItems value="#{asignadoUI.listaProfesores}" var="prof"
                                   itemLabel="#{prof.nombreProfesor} #{prof.apellidoP}" itemValue="#{prof.id}"/>
                </p:selectOneMenu>
            </div>

            <p:commandButton value="CONSULTAR HORARIO" actionListener="#{asignadoUI.consultarHorarioProfesor}"
                             update="resultado" styleClass="btn-primary-custom" style="margin-top: 20px;" />

            <h:panelGroup id="resultado">
                <h:panelGroup rendered="#{not empty asignadoUI.horarioTexto}">
                    <div class="horario-box">
                        <h:outputText value="#{asignadoUI.horarioTexto}" escape="false"/>
                    </div>
                </h:panelGroup>
            </h:panelGroup>
        </h:form>
    </div>
</h:body>
</html>
