<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Alta de Unidad de Aprendizaje - SAUAP</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/style.css" />
    <style>
        .horas-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }
        .hora-item {
            text-align: center;
        }
        .hora-item label {
            font-size: 1.1em;
            font-weight: bold;
            color: #002677;
            display: block;
            margin-bottom: 5px;
        }
        .ui-spinner-input {
            width: 65px !important;
            text-align: center !important;
            font-size: 1.3em !important;
            padding-left: 5px !important;
        }
    </style>
</h:head>

<h:body>
    <div class="header-container">
        <h:form>
            <h:commandLink action="index.xhtml?faces-redirect=true" styleClass="back-arrow">
                <span class="glyphicon glyphicon-arrow-left"></span>
            </h:commandLink>
        </h:form>
        <div class="header-title">Alta de Unidades de Aprendizaje</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="main-card" style="max-width: 550px;">
        <h:form id="formAltaUA">
            <p:growl id="growl" showDetail="true" life="3000" />

            <div class="form-group">
                <label>Nombre de la Unidad de Aprendizaje</label>
                <p:inputText id="nombre" value="#{unidadAprendizajeBeanUI.unidad.nombre}" 
                             required="true" requiredMessage="El nombre es obligatorio"
                             placeholder="Ej. Matemáticas I">
                    <f:validateLength maximum="50" />
                </p:inputText>
            </div>

            <div class="text-center" style="margin-top: 30px; margin-bottom: 10px;">
                <label style="font-weight: bold; color: #002677; font-size: 1.2em;">DISTRIBUCIÓN DE HORAS</label>
            </div>

            <div class="horas-container">
                <div class="hora-item">
                    <label>HC</label>
                    <p:spinner id="hc" min="0" max="4" value="#{unidadAprendizajeBeanUI.unidad.hrsClase}"
                               required="true" placeholder="0" />
                </div>
                <div class="hora-item">
                    <label>HL</label>
                    <p:spinner id="hl" min="0" max="4" value="#{unidadAprendizajeBeanUI.unidad.hrsLab}"
                               required="true" placeholder="0" />
                </div>
                <div class="hora-item">
                    <label>HT</label>
                    <p:spinner id="ht" min="0" max="4" value="#{unidadAprendizajeBeanUI.unidad.hrsTaller}"
                               required="true" placeholder="0" />
                </div>
            </div>

            <p:commandButton value="AGREGAR UNIDAD" actionListener="#{unidadAprendizajeBeanUI.guardar()}" 
                             update="formAltaUA" styleClass="btn-primary-custom" style="margin-top: 40px;" />
        </h:form>
    </div>
</h:body>
</html>
