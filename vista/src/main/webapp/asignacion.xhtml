<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Asignación - SAUAP</title>
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/style.css" />
        <style>
        .time-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }
        .time-box {
            text-align: center;
        }
        .time-box label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 1.5em;
        }
        
        /* Restoring original dropdown and search bar styles */
        .ui-selectonemenu .ui-selectonemenu-label {
            font-size: 1.2em !important;
            padding: 10px !important;
        }
        .ui-selectonemenu-panel .ui-selectonemenu-items .ui-selectonemenu-item {
            font-size: 1.6em !important;
            padding: 10px !important;
        }
        .ui-selectonemenu-filter-container .ui-selectonemenu-filter {
            font-size: 1.3em !important;
            padding: 10px 10px 10px 35px !important;
        }
        .ui-selectonemenu-filter-container .ui-icon-search {
            top: 50% !important;
            margin-top: -8px !important;
            left: 10px !important;
        }
        .ui-datepicker, .ui-datepicker-calendar, .ui-timepicker-div {
            font-size: 1.2em !important;
        }
    </style>
</h:head>

<h:body>
    <f:metadata>
        <f:event type="preRenderView" listener="#{asignadoUI.refreshData()}" />
    </f:metadata>
    <div class="header-container">        <h:form>
            <h:commandLink action="#{asignadoUI.regresar()}" styleClass="back-arrow">
                <span class="glyphicon glyphicon-arrow-left"></span>
            </h:commandLink>
        </h:form>
        <div class="header-title">Asignación de Unidades de Aprendizaje</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="main-card">
        <h:form id="formAsignacion">
            <p:growl id="growl" showDetail="true" life="3000" />

            <!-- UA -->
            <div class="form-group">
                <label>Seleccione una Unidad de Aprendizaje</label>
                <p:selectOneMenu id="ua" value="#{asignadoUI.idUA}" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="Seleccione..." itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{asignadoUI.listaUA}" var="ua" 
                                   itemLabel="#{ua.nombre}" itemValue="#{ua.id}" />
                </p:selectOneMenu>
            </div>

            <!-- Profesor -->
            <div class="form-group">
                <label>Seleccione un Profesor</label>
                <p:selectOneMenu id="profesor" value="#{asignadoUI.idProfesor}" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="Seleccione..." itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{asignadoUI.listaProfesores}" var="prof" 
                                   itemLabel="#{prof.nombreProfesor} #{prof.apellidoP}" itemValue="#{prof.id}" />
                </p:selectOneMenu>
            </div>

            <!-- dia -->
            <div class="form-group">
                <label>Día de la asignatura</label>
                <p:selectOneMenu id="dia" value="#{asignadoUI.asignado.dia}">
                    <f:selectItem itemLabel="Seleccione..." itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{asignadoUI.listaDias}" />
                </p:selectOneMenu>
            </div>

            <!-- Hora Inicio y Hora Fin (le puse min 7am y maximo 9pm, basandome en mi experiencia con la subasta -->
            <div class="time-container">
                <div class="time-box">
                    <label>Hora Inicio</label>
                    <p:datePicker id="hrInicio" value="#{asignadoUI.hrInicio}" timeOnly="true" pattern="HH:mm" 
                                  mindate="#{asignadoUI.minTime}" maxdate="#{asignadoUI.maxTime}" inline="true" />
                </div>
                <div class="time-box">
                    <label>Hora Fin</label>
                    <p:datePicker id="hrFin" value="#{asignadoUI.hrFin}" timeOnly="true" pattern="HH:mm" 
                                  mindate="#{asignadoUI.minTime}" maxdate="#{asignadoUI.maxTime}" inline="true" />
                </div>
            </div>

                <p:commandButton value="ASIGNAR" actionListener="#{asignadoUI.asignar()}" 
                                 update="formAsignacion" styleClass="btn-primary-custom" style="margin-top: 30px;" />
            </h:form>
        </div>
    </h:body>
</html>
