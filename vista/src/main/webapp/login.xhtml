<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Inicio de Sesión</title>
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <style>
            body {
                background-color: #f8f9fa;
            }
            .header-container {
                padding: 20px;
                border-bottom: 2px solid #002677;
                display: flex;
                justify-content: center;
                align-items: center;
                background: white;
            }
            .header-title {
                color: #002677;
                font-weight: bold;
                font-size: 24px;
            }
            .main-card {
                width: 30%;
                margin: 80px auto;
                padding: 40px;
                background: white;
                border: 1px solid #ddd;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                border-radius: 8px;
            }
            .form-group {
                margin-bottom: 25px;
            }
            .form-group label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
                color: #333;
                font-size: 1.1em;
            }
            .ui-inputfield {
                width: 100% !important;
                font-size: 1.1em !important;
                padding: 12px !important;
            }
            .btn-login {
                background-color: #002677 !important;
                color: white !important;
                padding: 12px 0 !important;
                font-size: 18px !important;
                font-weight: bold !important;
                border: none !important;
                border-radius: 6px !important;
                width: 100% !important;
                margin-top: 10px !important;
                text-shadow: none !important;
                cursor: pointer;
            }
            .btn-login:hover {
                background-color: #001a52 !important;
            }
            .logo-container {
                text-align: center;
                margin-bottom: 30px;
            }
            .logo-img {
                width: 180px;
            }
            .ui-growl {
                font-size: 1.5rem !important;
                width: 400px !important;
            }
            .ui-growl-item-container {
                width: 100% !important;
            }
            .ui-growl-message {
                width: 320px !important;
                padding: 0 0 5px 10px !important;
            }
            .ui-growl-title {
                font-weight: bold;
            }
        </style>
    </h:head>

    <h:body>
        <div class="header-container">
            <div class="header-title">Sistema de Gestión Universitaria</div>
        </div>

        <div class="main-card">
            <div class="logo-container">
                <p:graphicImage url="resources/logoSAUAPitalic.png" styleClass="logo-img" />
            </div>
            
            <h:form id="formLogin">
                <p:growl id="growl" showDetail="true" life="4000" />

                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <p:inputText id="username" value="#{loginUI.usuario.nombreUsuario}" 
                                 required="true" requiredMessage="Ingrese su usuario"
                                 placeholder="Ingrese su nombre de usuario" />
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <p:password id="password" value="#{loginUI.usuario.contrasenaUsuario}" 
                                required="true" requiredMessage="Ingrese su contraseña"
                                placeholder="Ingrese su contraseña" feedback="false" />
                </div>

                <p:commandButton value="INICIAR SESIÓN" actionListener="#{loginUI.login()}" 
                                 update="formLogin" styleClass="btn-login" />
            </h:form>
        </div>
    </h:body>
</html>
