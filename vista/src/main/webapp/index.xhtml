<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Menú Principal - SAUAP</title>
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/style.css" />
    </h:head>
    <h:body>
        <div class="header-container">
            <h:form>
                <h:commandLink action="login.xhtml?faces-redirect=true" styleClass="back-button" title="Cerrar Sesión">
                    <span class="glyphicon glyphicon-log-out"></span>
                </h:commandLink>
            </h:form>
            <div class="header-title">Menú Principal</div>
            <div style="width: 40px;"></div> <!-- Spacer -->
        </div>

        <div class="main-card">
            <h:form id="formMenu">
                <p:growl id="growl" showDetail="true" life="3000" />
                <div class="button-list">
                    <p:commandButton value="Alta Unidad de Aprendizaje" action="altaUA.xhtml?faces-redirect=true" styleClass="btn-primary-custom" style="margin-bottom: 15px;" />
                    <p:commandButton value="Alta Profesor" action="altaProfesor.xhtml?faces-redirect=true" styleClass="btn-primary-custom" style="margin-bottom: 15px;" />
                    <p:commandButton value="Asignación" action="asignacion.xhtml?faces-redirect=true" styleClass="btn-primary-custom" style="margin-bottom: 15px;" />
                    <p:commandButton value="Consulta" action="consulta.xhtml?faces-redirect=true" styleClass="btn-primary-custom" style="margin-bottom: 15px;" />
                    <p:commandButton value="Desasignación" actionListener="#{loginUI.mostrarProximamente()}" update="growl" styleClass="btn-primary-custom" />
                </div>
            </h:form>
        </div>
    </h:body>
</html>
