<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Alta de Profesor - SAUAP</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/style.css" />
</h:head>

<h:body>
    <div class="header-container">
        <h:form>
            <h:commandLink action="index.xhtml?faces-redirect=true" styleClass="back-arrow">
                <span class="glyphicon glyphicon-arrow-left"></span>
            </h:commandLink>
        </h:form>
        <div class="header-title">Alta de Profesores</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="main-card" style="max-width: 600px;">
        <h:form id="formAltaProfesor">
            <p:growl id="growl" showDetail="true" life="3000" />

            <div class="form-group">
                <label>Nombre(s)</label>
                <p:inputText id="nombre" value="#{profesorBeanUI.nombre}" required="true" requiredMessage="El nombre es obligatorio" placeholder="Ingrese nombre completo"/>
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>Apellido Paterno</label>
                    <p:inputText id="apPaterno" value="#{profesorBeanUI.apellidoPaterno}" required="true" requiredMessage="El apellido paterno es obligatorio"/>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Apellido Materno</label>
                    <p:inputText id="apMaterno" value="#{profesorBeanUI.apellidoMaterno}" required="true" requiredMessage="El apellido materno es obligatorio"/>
                </div>
            </div>

            <div class="form-group">
                <label>RFC</label>
                <p:inputText id="rfc" value="#{profesorBeanUI.rfc}" required="true" requiredMessage="El RFC es obligatorio" 
                             style="text-transform: uppercase;" maxlength="13" placeholder="XXXX000000XXX"/>
            </div>

            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <div style="display: flex; gap: 15px;">
                    <p:inputText id="dia" value="#{profesorBeanUI.dia}"
                                 placeholder="DD" maxlength="2"
                                 style="flex: 1; text-align: center;"
                                 oninput="this.value = this.value.replace(/[^0-9]/g, '')" />

                    <p:inputText id="mes" value="#{profesorBeanUI.mes}"
                                 placeholder="MM" maxlength="2"
                                 style="flex: 1; text-align: center;"
                                 oninput="this.value = this.value.replace(/[^0-9]/g, '')" />

                    <p:inputText id="anio" value="#{profesorBeanUI.anio}"
                                 placeholder="YYYY" maxlength="4"
                                 style="flex: 1; text-align: center;"
                                 oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                </div>
            </div>

            <p:commandButton value="REGISTRAR PROFESOR" actionListener="#{profesorBeanUI.altaProfesor()}" 
                             update="formAltaProfesor" styleClass="btn-primary-custom" style="margin-top: 30px;" />
        </h:form>
    </div>
</h:body>
</html>
